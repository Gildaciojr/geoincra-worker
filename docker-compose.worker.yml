services:

  geoincra_worker:
    build: .
    container_name: geoincra_worker
    restart: always


    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://geoincra_user:domboscojacutinga33@geoincra_postgres:5432/geoincra_db
      DATA_DIR: /data
      BACKEND_UPLOADS_BASE: /app/app/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # permite importar código do backend
      PYTHONPATH: /backend_app

    volumes:

      # uploads compartilhados
      - geoincra_uploads:/data
      - geoincra_uploads:/app/app/uploads

      # código do backend em pasta separada
      - /opt/geoincra/backend/app:/backend_app

    networks:
      - backend_default


volumes:
  geoincra_uploads:
    external: true


networks:
  backend_default:
    external: true